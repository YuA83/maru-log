<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Maru-Log</title>
  <script>
    /**
     * GitHub Pages SPA 라우팅 해결책
     *
     * GitHub Pages는 /posts/post1 같은 경로로 직접 접근하면 404를 반환합니다.
     * 이 파일이 해당 경로를 쿼리 파라미터로 변환해 index.html로 리다이렉트하고,
     * index.html의 스크립트가 원래 경로로 복원합니다.
     *
     * segmentCount:
     *   - username.github.io        → 0
     *   - username.github.io/repo   → 1
     */
    const segmentCount = 0

    const l = window.location
    l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
    )
  </script>
</head>
<body></body>
</html>
